  <script>(function(){try{var t=localStorage.getItem('theme');if(!t)t=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>

  <style>
    /* Premium Detail Page specific overrides */
    .project-detail-hero {
      padding: 80px 0 40px;
    }
    .project-header-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .project-tag {
      display: inline-block;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .project-detail-title {
      font-family: 'SF Pro Display', -apple-system, sans-serif;
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-bottom: 24px;
      line-height: 1.1;
      color: var(--text);
    }
    .project-detail-desc {
      font-size: 18px;
      line-height: 1.6;
      color: var(--text-muted);
      max-width: 720px;
      margin-bottom: 32px;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
      margin-top: 48px;
      margin-bottom: 80px;
      align-items: start;
    }
    .gallery-item {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--bg-alt);
      overflow: hidden;
      cursor: zoom-in;
      border-radius: var(--radius);
    }
    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .gallery-item:hover img {
      transform: scale(1.02);
    }
    @media (min-width: 768px) {
      .project-detail-title {
        font-size: 56px;
      }
    }
    @media (min-width: 992px) {
      .gallery-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
