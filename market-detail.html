  <style>
    .market-detail { padding: 120px 0 80px; }
    .market-detail-header { margin-bottom: 48px; }
    .market-detail-title {
      font-family: 'SF Pro Display', -apple-system, sans-serif;
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 16px;
    }
    .market-detail-desc {
      font-size: 18px;
      line-height: 1.6;
      color: var(--text-muted);
      max-width: 640px;
      margin-bottom: 32px;
    }
    .resource-image-container {
      width: 100%;
      max-width: 480px;
      aspect-ratio: 1 / 1;
      border: 1px solid var(--border);
      background: var(--bg-alt);
      margin: 0 auto 48px;
      overflow: hidden;
      cursor: zoom-in;
    }
    .market-detail-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 24px;
      box-sizing: border-box;
      display: block;
      filter: drop-shadow(0 0 10px rgba(127, 127, 127, 0.5));
      transition: transform 0.4s ease, filter 0.4s ease;
    }
    .resource-image-container:hover .market-detail-image {
      transform: scale(1.03);
      filter: drop-shadow(0 0 14px rgba(127, 127, 127, 0.7));
    }
    .market-detail-info {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 24px;
      margin-bottom: 32px;
      padding: 24px;
      border: 1px solid var(--border);
    }
    .market-detail-price {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .market-detail-price.is-free {
      color: #16a34a;
    }
    .market-detail-tag {
      display: inline-block;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .market-detail-cta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .market-detail-cta .btn {
      min-width: 200px;
      text-align: center;
    }
  </style>
</head>
